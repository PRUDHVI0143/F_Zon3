services:
  - type: web
    name: fzon3
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn fzon3_project.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
