{% extends 'base.html' %}
{% block content %}
<div class='auth-container'>
    <h2>Login to F ZoN3</h2>
    <form method='post'>
        {% csrf_token %}
        {{ form.as_p }}
        <button type='submit' class='btn btn-primary' style='width: 100%; margin-top: 20px;'>Login</button>
    </form>
    <p style='margin-top: 20px; text-align: center;'>Don't have an account? <a href='{% url "accounts:register" %}'>Register here</a></p>
</div>
{% endblock %}
