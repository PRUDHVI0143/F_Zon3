{% extends 'base.html' %}
{% block content %}
<div class='auth-wrapper'>
    <div class='auth-container'>
        <h2>Welcome Back</h2>
        <p class='auth-subtitle'>Enter the ZoN3</p>
        <form method='post'>
            {% csrf_token %}
            {{ form.as_p }}
            <button type='submit' class='btn btn-primary auth-action-btn'>Initialize Link</button>
        </form>
        <div class='auth-footer'>
            New player? <a href='{% url "accounts:register" %}'>Create an Identity</a>
        </div>
    </div>
</div>
{% endblock %}
