{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<style>
    .cyber-card {
        background: rgba(20, 20, 30, 0.95);
        border: 1px solid var(--primary);
        box-shadow: 0 0 30px rgba(0, 242, 255, 0.15);
        padding: 40px;
        border-radius: 20px;
        position: relative;
        overflow: hidden;
    }

    .form-group label {
        color: var(--primary);
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 2px;
        margin-bottom: 10px;
    }

    .form-group input {
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(0, 242, 255, 0.3);
        color: #fff;
        padding: 15px;
        border-radius: 12px;
        width: 100%;
        margin-bottom: 20px;
        transition: all 0.3s;
    }

    .form-group input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 15px var(--primary-glow);
        outline: none;
    }

    .cyber-title {
        color: #fff;
        text-shadow: 0 0 10px var(--primary-glow);
        margin-bottom: 30px;
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 4px;
    }
</style>
{% endblock %}

{% block content %}
<div class="container" style="padding: 100px 0;">
    <div class="auth-container cyber-card">
        <h2 class="cyber-title">Change Password</h2>

        <form method="post" class="form-grid">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <div style="color: var(--accent); font-size: 0.8rem; margin-top: -15px; margin-bottom: 15px;">
                    {{ field.errors.0 }}
                </div>
                {% endif %}
            </div>
            {% endfor %}

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">UPDATE SECURITY
                KEY</button>
            <a href="{% url 'accounts:profile' %}" class="btn logout-btn"
                style="width: 100%; text-align: center; margin-top: 15px; border-radius: 12px;">CANCEL REQUEST</a>
        </form>
    </div>
</div>
{% endblock %}
