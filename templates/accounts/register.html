{% extends 'base.html' %}
{% block content %}
<div class='auth-wrapper'>
    <div class='auth-container'>
        <h2>Create Identity</h2>
        <p class='auth-subtitle'>Join the ZoN3 and start climbing</p>
        <form method='post'>
            {% csrf_token %}
            {{ form.as_p }}
            <button type='submit' class='btn btn-primary auth-action-btn'>Initialize Protocol</button>
        </form>
        <div class='auth-footer'>
            Existing player? <a href='{% url "accounts:login" %}'>Establish Link</a>
        </div>
    </div>
</div>
{% endblock %}
