{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<style>
    :root { --cyber-primary: #00f0ff; --cyber-secondary: #ff003c; --cyber-accent: #fcee0a; }
    .game-container h1 { font-family: 'Courier New', monospace !important; color: var(--cyber-primary) !important; text-shadow: 0 0 15px var(--cyber-primary); text-transform: uppercase; letter-spacing: 5px; -webkit-text-fill-color: var(--cyber-primary) !important; background: none !important; }
    .subtitle { color: var(--cyber-accent); text-shadow: 0 0 5px var(--cyber-accent); font-weight: bold; letter-spacing: 2px; font-family: 'Courier New', monospace; }
    .hud-panel { background: rgba(0,0,0,0.6) !important; border: 1px solid var(--cyber-primary) !important; box-shadow: inset 0 0 15px rgba(0,240,255,0.2) !important; border-radius: 5px !important; font-family: 'Courier New', monospace; }
    .hud-label { color: #8892b0 !important; }
    .hud-value { color: var(--cyber-primary) !important; text-shadow: 0 0 10px var(--cyber-primary) !important; }
    .game-board-wrapper { background: transparent !important; border: none !important; box-shadow: none !important; }
    .btn-cyber { background: transparent; color: var(--cyber-primary); border: 1px solid var(--cyber-primary); padding: 12px 24px; font-family: 'Courier New', monospace; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: all 0.3s; box-shadow: 0 0 10px rgba(0,240,255,0.2); }
    .btn-cyber:hover { background: var(--cyber-primary); color: #000; box-shadow: 0 0 20px var(--cyber-primary); }

    .grid-2048 {
        width: 420px; height: 420px;
        background: rgba(0,0,0,0.6) !important;
        border: 2px solid var(--cyber-primary) !important;
        border-radius: 8px !important;
        display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr);
        gap: 8px; padding: 8px;
        box-shadow: 0 0 30px rgba(0,240,255,0.2) !important;
    }
    .tile {
        background: rgba(0,240,255,0.05) !important; border-radius: 5px !important;
        display: flex; font-size: 2rem; font-weight: 900; color: #fff;
        align-items: center; justify-content: center;
        transition: all 0.15s; border: 1px solid rgba(0,240,255,0.2) !important;
        font-family: 'Courier New', monospace;
    }
    .tile-2 { background: rgba(0,240,255,0.1) !important; color: var(--cyber-primary) !important; box-shadow: 0 0 10px rgba(0,240,255,0.3); }
    .tile-4 { background: rgba(0,240,255,0.2) !important; color: var(--cyber-primary) !important; border-color: var(--cyber-primary) !important; }
    .tile-8 { background: rgba(112,0,255,0.5) !important; box-shadow: 0 0 15px rgba(112,0,255,0.5); }
    .tile-16 { background: rgba(255,0,60,0.5) !important; box-shadow: 0 0 15px var(--cyber-secondary); }
    .tile-32 { background: rgba(252,238,10,0.5) !important; color: #000 !important; box-shadow: 0 0 15px var(--cyber-accent); }
    .tile-64 { background: var(--cyber-secondary) !important; box-shadow: 0 0 20px var(--cyber-secondary); }
    .tile-128 { background: var(--cyber-primary) !important; color: #000 !important; box-shadow: 0 0 25px var(--cyber-primary); font-size: 1.8rem; }
    .tile-256 { background: #00ff88 !important; color: #000 !important; box-shadow: 0 0 25px #00ff88; font-size: 1.8rem; }
    .tile-512 { background: var(--cyber-accent) !important; color: #000 !important; box-shadow: 0 0 30px var(--cyber-accent); font-size: 1.7rem; }
    .tile-1024 { background: linear-gradient(135deg, var(--cyber-primary), var(--cyber-secondary)) !important; font-size: 1.5rem; box-shadow: 0 0 35px var(--cyber-primary); }
    .tile-2048 { background: linear-gradient(135deg, var(--cyber-accent), var(--cyber-secondary)) !important; font-size: 1.5rem; box-shadow: 0 0 40px var(--cyber-accent); animation: winPulse 0.5s infinite alternate; }
    @keyframes winPulse { from { box-shadow: 0 0 20px var(--cyber-accent); } to { box-shadow: 0 0 50px var(--cyber-accent); } }
</style>
{% endblock %}

{% block content %}
<div class="container game-container">
    <h1>2048 Fusion</h1>
    <p class="subtitle">DATA MERGE PROTOCOL</p>

    <div class="hud-panel">
        <div class="hud-item">
            <div class="hud-label">Power Level</div>
            <div class="hud-value" id="current-score">0</div>
        </div>
        <div class="hud-item">
            <div class="hud-label">Status</div>
            <div class="hud-value" style="font-size: 0.8rem;">STABLE</div>
        </div>
    </div>

    <div class="game-board-wrapper">
        <div class="grid-2048" id="grid2048"></div>
    </div>

    <div style="margin-top: 30px; display: flex; gap: 15px;">
        <button class="btn-cyber" onclick="resetGame()">REBOOT CORE</button>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/games/2048.js' %}"></script>
{% endblock %}
