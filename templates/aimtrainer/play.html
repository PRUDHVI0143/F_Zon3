{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<style>
    :root { --cyber-primary: #00f2ff; --cyber-secondary: #ff003c; --cyber-accent: #fcee0a; }
    
    .game-container { display: flex; flex-direction: column; align-items: center; }
    .game-container h1 { font-family: 'Courier New', monospace !important; color: var(--cyber-primary) !important; text-shadow: 0 0 15px var(--cyber-primary); text-transform: uppercase; letter-spacing: 5px; -webkit-text-fill-color: var(--cyber-primary) !important; background: none !important; margin-bottom: 0px;}
    .subtitle { color: var(--cyber-accent); text-shadow: 0 0 5px var(--cyber-accent); font-weight: bold; letter-spacing: 2px; font-family: 'Courier New', monospace; margin-bottom: 20px;}
    
    .hud-panel { display: flex; gap: 40px; background: rgba(0,0,0,0.6) !important; border: 1px solid var(--cyber-primary) !important; box-shadow: inset 0 0 15px rgba(0,240,255,0.2) !important; border-radius: 5px !important; padding: 15px 40px; font-family: 'Courier New', monospace; margin-bottom: 20px;}
    .hud-item { display: flex; flex-direction: column; align-items: center; gap: 5px;}
    .hud-label { color: #8892b0 !important; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;}
    .hud-value { color: var(--cyber-primary) !important; text-shadow: 0 0 10px var(--cyber-primary) !important; font-size: 1.5rem; font-weight: bold;}
    
    .btn-cyber { background: rgba(0,0,0,0.8); color: var(--cyber-primary); border: 1px solid var(--cyber-primary); padding: 12px 24px; font-family: 'Courier New', monospace; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: all 0.3s; box-shadow: 0 0 10px rgba(0,240,255,0.2); border-radius: 4px; }
    .btn-cyber:hover { background: var(--cyber-primary); color: #000; box-shadow: 0 0 20px var(--cyber-primary); border-color: #fff;}

    .arena-wrapper {
        position: relative;
        padding: 4px;
        background: linear-gradient(45deg, var(--cyber-primary), #000, var(--cyber-secondary), #000, #7000ff);
        background-size: 400% 400%;
        border-radius: 8px;
        animation: borderPulse 8s infinite alternate;
    }
    
    .arena-wrapper.shake {
        animation: errorShake 0.3s cubic-bezier(.36,.07,.19,.97) both;
        background: #ff003c;
    }

    .target-container {
        width: 900px; height: 550px;
        background: radial-gradient(circle at center, #0a1128 0%, #02040a 100%) !important;
        position: relative; 
        cursor: none;
        overflow: hidden;
        border-radius: 6px;
        box-shadow: inset 0 0 80px rgba(0,0,0,0.9);
    }
    
    .target-container::before {
        content: ''; position: absolute; inset: 0;
        background: 
            linear-gradient(rgba(0, 242, 255, 0.04) 1px, transparent 1px), 
            linear-gradient(90deg, rgba(0, 242, 255, 0.04) 1px, transparent 1px);
        background-size: 50px 50px; 
        background-position: center;
        pointer-events: none;
        z-index: 0;
    }
    
    .target-container::after {
        content: ''; position: absolute; inset: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        background-size: 100% 4px, 6px 100%;
        z-index: 10; pointer-events: none;
    }

    .target-node {
        position: absolute;
        border-radius: 50%;
        cursor: none;
        display: flex;
        align-items: center;
        justify-content: center;
        transform: translate(-50%, -50%); 
        animation: targetSpawn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        z-index: 2;
    }
    
    .target-core {
        width: 100%; height: 100%;
        border-radius: 50%;
        background: radial-gradient(circle, #fff 10%, var(--cyber-secondary) 45%, rgba(255,0,60,0.2) 80%);
        box-shadow: 0 0 25px var(--cyber-secondary), inset 0 0 12px #fff;
        animation: corePulse 1.5s infinite alternate;
    }

    .target-ring {
        position: absolute; inset: -8px;
        border: 2px dashed rgba(255, 0, 60, 0.7);
        border-radius: 50%;
        animation: ringSpin 3s linear infinite;
        pointer-events: none;
    }

    #custom-crosshair {
        position: absolute;
        width: 32px; height: 32px;
        pointer-events: none;
        z-index: 100;
        transform: translate(-50%, -50%);
        transition: transform 0.08s ease-out;
    }
    
    .crosshair-h { position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: var(--cyber-primary); transform: translateY(-50%); box-shadow: 0 0 8px var(--cyber-primary);}
    .crosshair-v { position: absolute; left: 50%; top: 0; height: 100%; width: 2px; background: var(--cyber-primary); transform: translateX(-50%); box-shadow: 0 0 8px var(--cyber-primary);}
    .crosshair-dot { position: absolute; top: 50%; left: 50%; width: 5px; height: 5px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px #fff; }
    
    #custom-crosshair.firing {
        transform: translate(-50%, -50%) scale(0.6) rotate(45deg);
    }
    #custom-crosshair.recoil {
        transform: translate(-50%, -50%) scale(1.3);
    }

    .spark {
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
        z-index: 3;
    }
    
    .float-text {
        position: absolute;
        font-family: 'Courier New', monospace;
        font-weight: bold;
        pointer-events: none;
        z-index: 4;
        animation: floatUp 0.8s ease-out forwards;
        transform: translate(-50%, -50%);
        text-shadow: 0 0 10px currentColor;
    }

    @keyframes targetSpawn { from { transform: translate(-50%, -50%) scale(0); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
    @keyframes corePulse { from { transform: scale(0.9); } to { transform: scale(1.05); box-shadow: 0 0 40px var(--cyber-secondary), inset 0 0 20px #fff; } }
    @keyframes ringSpin { 100% { transform: rotate(360deg); } }
    @keyframes borderPulse { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
    @keyframes floatUp { 0% { opacity: 1; transform: translate(-50%, -10px) scale(0.8); } 100% { opacity: 0; transform: translate(-50%, -50px) scale(1.3); } }
    
    @keyframes errorShake {
        0%, 100% { transform: translate(0, 0); }
        20% { transform: translate(-10px, 5px); }
        40% { transform: translate(10px, -5px); }
        60% { transform: translate(-10px, -3px); }
        80% { transform: translate(5px, 3px); }
    }
    
    #countdown-overlay {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: rgba(0,0,20,0.8);
        z-index: 20;
        pointer-events: none;
        opacity: 0; transition: opacity 0.3s;
    }
    #countdown-text {
        font-size: 8rem;
        color: var(--cyber-accent);
        text-shadow: 0 0 40px var(--cyber-accent);
        animation: popIn 1s infinite;
    }
    @keyframes popIn { 0% { transform: scale(0.5); opacity: 0;} 15% { transform: scale(1.3); opacity: 1;} 100% { transform: scale(1); opacity: 0; } }
</style>
{% endblock %}

{% block content %}
<div class="container game-container">
    <h1>Precision Sync</h1>
    <p class="subtitle">TARGET ACQUISITION TRAINING [V2.0]</p>

    <div class="hud-panel">
        <div class="hud-item"><div class="hud-label">Uptime</div><div class="hud-value" id="timer-val">30.0s</div></div>
        <div class="hud-item"><div class="hud-label">Target Hits</div><div class="hud-value" id="score-val">0</div></div>
        <div class="hud-item"><div class="hud-label">Accuracy</div><div class="hud-value" id="acc-val">100%</div></div>
        <div class="hud-item"><div class="hud-label">Misses</div><div class="hud-value" id="miss-count" style="color: var(--cyber-secondary) !important;">0</div></div>
        <div class="hud-item"><div class="hud-label">Total Score</div><div class="hud-value" id="points-val" style="color: var(--cyber-accent) !important;">0</div></div>
    </div>

    <div class="arena-wrapper" id="arenaWrapper">
        <div class="target-container" id="targetContainer">
            <div id="countdown-overlay"><div id="countdown-text"></div></div>
            <div id="custom-crosshair" style="display:none;">
                <div class="crosshair-h"></div><div class="crosshair-v"></div><div class="crosshair-dot"></div>
            </div>
        </div>
    </div>

    <div style="margin-top: 30px; display: flex; gap: 15px;">
        <button class="btn-cyber" id="startBtn" onclick="initTraining()">ENGAGE SIMULATION</button>
        <button class="btn-cyber" id="ins-btn" style="border-color: #8892b0; color: #8892b0;">PROTOCOL DOCS</button>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/games/aimtrainer.js' %}"></script>
{% endblock %}
