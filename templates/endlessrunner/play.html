{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<style>
    :root { --cyber-primary: #00f0ff; --cyber-secondary: #ff003c; --cyber-accent: #fcee0a; }
    .game-container h1 { font-family: 'Courier New', monospace !important; color: var(--cyber-primary) !important; text-shadow: 0 0 15px var(--cyber-primary); text-transform: uppercase; letter-spacing: 5px; -webkit-text-fill-color: var(--cyber-primary) !important; background: none !important; }
    .subtitle { color: var(--cyber-accent); text-shadow: 0 0 5px var(--cyber-accent); font-weight: bold; letter-spacing: 2px; font-family: 'Courier New', monospace; }
    .hud-panel { display: none !important; }
    .btn-cyber { background: transparent; color: var(--cyber-primary); border: 1px solid var(--cyber-primary); padding: 12px 24px; font-family: 'Courier New', monospace; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: all 0.3s; box-shadow: 0 0 10px rgba(0,240,255,0.2); }
    .btn-cyber:hover { background: var(--cyber-primary); color: #000; box-shadow: 0 0 20px var(--cyber-primary); }
    .game-board-wrapper { background: transparent !important; border: none !important; box-shadow: none !important; padding: 0 !important; }
    #runnerCanvas { border: none !important; border-radius: 0 !important; box-shadow: none !important; cursor: pointer; display: block; }
    .canvas-wrap { border: 2px solid var(--cyber-primary); border-radius: 5px; overflow: hidden; box-shadow: 0 0 30px rgba(0,240,255,0.15); }
    .controls-hint { color: #8892b0; font-family: 'Courier New', monospace; font-size: 0.85rem; margin-top: 12px; text-align: center; }
    .controls-hint span { color: var(--cyber-primary); }
</style>
{% endblock %}

{% block content %}
<div class="container game-container">
    <h1>Robo Runner</h1>
    <p class="subtitle">DODGE THE PENGUIN SWARM</p>
    <div class="game-board-wrapper">
        <div class="canvas-wrap">
            <canvas id="runnerCanvas" width="900" height="280"></canvas>
        </div>
    </div>
    <p class="controls-hint"><span>SPACE</span> / <span>↑</span> / <span>CLICK</span> to jump · <span>↓</span> to duck</p>
    <div style="margin-top: 15px; display: flex; gap: 15px;">
        <button id="start-btn" class="btn-cyber">START</button>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function(){
var canvas = document.getElementById('runnerCanvas');
var ctx = canvas.getContext('2d');
var startBtn = document.getElementById('start-btn');
var W = 900, H = 280;
var GROUND = H - 50;

var gameRunning = false, gameOver = false;
var score = 0, hiScore = 0, speed = 6, dist = 0;
var animFrame = null;

var bumps = [];
for(var i=0;i<50;i++) bumps.push({x:i*20,w:5+Math.random()*12,h:2+Math.random()*3});
var clouds = [];
for(var i=0;i<4;i++) clouds.push({x:200+Math.random()*W,y:30+Math.random()*60});

var robo = {x:60,y:GROUND-50,w:40,h:50,vy:0,onGround:true,ducking:false,leg:0};
var DUCK_H=28, JUMP=-12, GRAV=0.55;

var obs = [];
var spawnT=0, spawnI=90;

function makeObs(){
    var r=Math.random();
    if(r<0.3) obs.push({x:W+10,y:GROUND-32,w:24,h:32,t:'s'});
    else if(r<0.55) obs.push({x:W+10,y:GROUND-48,w:28,h:48,t:'t'});
    else if(r<0.75) obs.push({x:W+10,y:GROUND-32,w:55,h:32,t:'g'});
    else obs.push({x:W+10,y:GROUND-70-Math.random()*25,w:36,h:22,t:'f',wt:0});
}

/* DRAW PENGUIN */
function dPeng(px,bot,sc){
    var s=sc||1, cx=px+12*s;
    ctx.fillStyle='#222';
    ctx.beginPath(); ctx.arc(cx,bot-14*s,10*s,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ddd';
    ctx.beginPath(); ctx.arc(cx,bot-11*s,7*s,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#222';
    ctx.beginPath(); ctx.arc(cx,bot-28*s,8*s,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(cx-3*s,bot-29*s,2.5*s,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(cx-2*s,bot-29*s,1.2*s,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ff8c00';
    ctx.beginPath(); ctx.moveTo(cx-8*s,bot-27*s); ctx.lineTo(cx-14*s,bot-25*s); ctx.lineTo(cx-8*s,bot-23*s); ctx.closePath(); ctx.fill();
    ctx.fillRect(cx-8*s,bot-2,6*s,3); ctx.fillRect(cx+1*s,bot-2,6*s,3);
}

function drawOb(o){
    if(o.t==='g'){ dPeng(o.x,GROUND,0.85); dPeng(o.x+18,GROUND,0.9); dPeng(o.x+36,GROUND,0.8); return; }
    if(o.t==='f'){
        o.wt=(o.wt||0)+0.15; var cx=o.x+o.w/2, cy=o.y+o.h/2, wf=Math.sin(o.wt)*10;
        ctx.fillStyle='#222';
        ctx.beginPath(); ctx.arc(cx,cy,12,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#ddd';
        ctx.beginPath(); ctx.arc(cx,cy+1,8,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#222';
        ctx.beginPath(); ctx.moveTo(cx-10,cy); ctx.lineTo(cx-20,cy-8+wf); ctx.lineTo(cx-5,cy+3); ctx.fill();
        ctx.beginPath(); ctx.moveTo(cx+10,cy); ctx.lineTo(cx+20,cy-8+wf); ctx.lineTo(cx+5,cy+3); ctx.fill();
        ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(cx-8,cy-5,5,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(cx-10,cy-6,2,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#ff8c00';
        ctx.beginPath(); ctx.moveTo(cx-13,cy-4); ctx.lineTo(cx-18,cy-3); ctx.lineTo(cx-13,cy-1); ctx.closePath(); ctx.fill();
        return;
    }
    var sc = o.t==='t' ? 1.3 : 1.0;
    dPeng(o.x, o.y+o.h, sc);
}

/* DRAW ROBOT */
function drawRobot(){
    var x=robo.x, h=robo.ducking?DUCK_H:robo.h;
    var y=robo.ducking?GROUND-DUCK_H:robo.y;
    var cx=x+robo.w/2, bot=y+h;

    if(robo.ducking){
        ctx.fillStyle='#555'; ctx.fillRect(x,y+6,robo.w,h-6);
        ctx.strokeStyle='#888'; ctx.lineWidth=1; ctx.strokeRect(x,y+6,robo.w,h-6);
        ctx.fillStyle='#00f0ff'; ctx.fillRect(x+robo.w-14,y+10,10,4); ctx.fillRect(x+robo.w-14,y+17,10,4);
        ctx.strokeStyle='#999'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(cx,y+6); ctx.lineTo(cx,y-2); ctx.stroke();
        ctx.fillStyle='#ff003c'; ctx.beginPath(); ctx.arc(cx,y-2,3,0,Math.PI*2); ctx.fill();
    } else {
        robo.leg+=0.25;
        var la=Math.sin(robo.leg)*(robo.onGround?6:0);
        // Legs
        ctx.fillStyle='#666';
        ctx.fillRect(cx-10,bot-14+la,7,14-la);
        ctx.fillRect(cx+3,bot-14-la,7,14+la);
        ctx.fillStyle='#888';
        ctx.fillRect(cx-12,bot-2+la,10,3);
        ctx.fillRect(cx+1,bot-2-la,10,3);
        // Body
        ctx.fillStyle='#555'; ctx.fillRect(x+6,y+16,robo.w-12,24);
        ctx.strokeStyle='#888'; ctx.lineWidth=1; ctx.strokeRect(x+6,y+16,robo.w-12,24);
        // Chest bars
        ctx.fillStyle='rgba(0,240,255,0.2)'; ctx.fillRect(x+10,y+20,robo.w-20,8);
        var bars=3+Math.floor((Date.now()/300)%3);
        ctx.fillStyle='#00f0ff';
        for(var b=0;b<bars;b++) ctx.fillRect(x+12+b*6,y+22,4,4);
        // Arms
        var aa=Math.sin(robo.leg)*(robo.onGround?12:20);
        ctx.fillStyle='#666';
        ctx.save(); ctx.translate(x+4,y+20); ctx.rotate((-15+aa)*Math.PI/180);
        ctx.fillRect(-2,0,5,16); ctx.restore();
        ctx.save(); ctx.translate(x+robo.w-4,y+20); ctx.rotate((15-aa)*Math.PI/180);
        ctx.fillRect(-3,0,5,16); ctx.restore();
        // Head
        ctx.fillStyle='#666'; ctx.fillRect(x+8,y,robo.w-16,18);
        ctx.strokeStyle='#888'; ctx.lineWidth=1; ctx.strokeRect(x+8,y,robo.w-16,18);
        // Eyes
        ctx.fillStyle='#00f0ff';
        ctx.shadowBlur=8; ctx.shadowColor='#00f0ff';
        ctx.fillRect(x+12,y+6,6,4); ctx.fillRect(x+robo.w-18,y+6,6,4);
        ctx.shadowBlur=0;
        // Antenna
        ctx.strokeStyle='#999'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(cx,y); ctx.lineTo(cx,y-8); ctx.stroke();
        ctx.fillStyle='#ff003c'; ctx.shadowBlur=5; ctx.shadowColor='#ff003c';
        ctx.beginPath(); ctx.arc(cx,y-8,3,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0;
        // Jet when jumping
        if(!robo.onGround){
            var fh=6+Math.random()*8;
            ctx.fillStyle='rgba(255,140,0,0.7)';
            ctx.beginPath(); ctx.moveTo(cx-6,bot); ctx.lineTo(cx,bot+fh); ctx.lineTo(cx+6,bot); ctx.fill();
            ctx.fillStyle='rgba(255,220,0,0.9)';
            ctx.beginPath(); ctx.moveTo(cx-3,bot); ctx.lineTo(cx,bot+fh*0.5); ctx.lineTo(cx+3,bot); ctx.fill();
        }
    }
}

function padS(n){ var s=''+n; while(s.length<5)s='0'+s; return s; }

function draw(){
    ctx.fillStyle='#1a1a2e'; ctx.fillRect(0,0,W,H);
    // Clouds
    for(var i=0;i<clouds.length;i++){
        var cl=clouds[i];
        ctx.fillStyle='rgba(200,200,200,0.2)';
        ctx.beginPath(); ctx.arc(cl.x,cl.y,12,0,Math.PI*2);
        ctx.arc(cl.x+15,cl.y-5,14,0,Math.PI*2);
        ctx.arc(cl.x+30,cl.y-2,11,0,Math.PI*2); ctx.fill();
    }
    // Ground
    ctx.strokeStyle='#555'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,GROUND); ctx.lineTo(W,GROUND); ctx.stroke();
    ctx.fillStyle='#333';
    for(var i=0;i<bumps.length;i++){
        ctx.fillRect(bumps[i].x,GROUND+2,bumps[i].w,bumps[i].h);
    }
    // Obstacles
    for(var i=0;i<obs.length;i++) drawOb(obs[i]);
    // Robot
    drawRobot();
    // Score
    ctx.fillStyle='#888'; ctx.font='bold 16px Courier New'; ctx.textAlign='right';
    ctx.fillText('HI '+padS(hiScore)+'  '+padS(score), W-15, 25);
    ctx.textAlign='left';
    // Game over
    if(gameOver){
        ctx.fillStyle='#fff'; ctx.font='bold 22px Courier New'; ctx.textAlign='center';
        ctx.fillText('G A M E   O V E R',W/2,H/2-20);
        ctx.font='14px Courier New'; ctx.fillStyle='#888';
        ctx.fillText('Press SPACE or Click to restart',W/2,H/2+10);
        ctx.textAlign='left';
    }
}

function update(){
    if(!gameRunning) return;
    robo.vy+=GRAV; robo.y+=robo.vy;
    var ch=robo.ducking?DUCK_H:robo.h;
    var gl=GROUND-ch;
    if(robo.y>=gl){robo.y=gl;robo.vy=0;robo.onGround=true;}
    dist++; score=Math.floor(dist/6); speed=6+dist*0.0015;
    if(score>0&&score%100===0&&dist%6===0&&window.playSound) window.playSound('click');
    spawnT++;
    if(spawnT>=spawnI){makeObs();spawnT=0;spawnI=Math.max(35,90-dist*0.008)+Math.random()*30;}
    for(var i=obs.length-1;i>=0;i--){
        var o=obs[i]; o.x-=speed;
        if(o.x+o.w<-30){obs.splice(i,1);continue;}
        var px=robo.x+10,py=(robo.ducking?GROUND-DUCK_H:robo.y)+6;
        var pw=robo.w-18,ph=ch-12;
        if(px<o.x+o.w-4&&px+pw>o.x+4&&py<o.y+o.h-4&&py+ph>o.y+4){die();return;}
    }
    for(var i=0;i<clouds.length;i++){
        clouds[i].x-=speed*0.15;
        if(clouds[i].x<-50){clouds[i].x=W+Math.random()*200;clouds[i].y=25+Math.random()*65;}
    }
    for(var i=0;i<bumps.length;i++){
        bumps[i].x-=speed;
        if(bumps[i].x+bumps[i].w<0){bumps[i].x=W+Math.random()*30;bumps[i].w=5+Math.random()*12;bumps[i].h=2+Math.random()*3;}
    }
    draw();
    animFrame=requestAnimationFrame(update);
}

function die(){
    gameRunning=false; gameOver=true;
    if(animFrame)cancelAnimationFrame(animFrame);
    if(score>hiScore)hiScore=score;
    if(window.playSound)window.playSound('lose');
    if(window.submitScore)window.submitScore('endlessrunner',score);
    startBtn.innerText='RESTART';
    draw();
}

function startGame(){
    score=0;dist=0;speed=6;obs=[];spawnT=0;spawnI=90;
    robo.y=GROUND-robo.h;robo.vy=0;robo.onGround=true;robo.ducking=false;robo.leg=0;
    gameRunning=true;gameOver=false;
    startBtn.innerText='RUNNING...';
    update();
}

function jump(){
    if(robo.onGround&&gameRunning){robo.vy=JUMP;robo.onGround=false;if(window.playSound)window.playSound('click');}
}

document.addEventListener('keydown',function(e){
    if(e.key===' '||e.key==='ArrowUp'){
        if(gameOver)startGame(); else if(!gameRunning)startGame(); else jump();
        e.preventDefault();
    }
    if(e.key==='ArrowDown'&&gameRunning){robo.ducking=true;e.preventDefault();}
});
document.addEventListener('keyup',function(e){if(e.key==='ArrowDown')robo.ducking=false;});
canvas.addEventListener('click',function(){if(gameOver||!gameRunning)startGame();else jump();});
startBtn.addEventListener('click',function(){if(!gameRunning||gameOver)startGame();});

// INITIAL DRAW
robo.y=GROUND-robo.h;
draw();
ctx.fillStyle='#00f0ff'; ctx.font='bold 18px Courier New'; ctx.textAlign='center';
ctx.fillText('PRESS SPACE OR CLICK TO START',W/2,H/2);
ctx.textAlign='left';
})();
</script>
{% endblock %}
