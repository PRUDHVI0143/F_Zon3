{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root {
        --cyber-bg: #0b0f19;
        --cyber-board: #111a2f;
        --cyber-primary: #00f0ff;
        --cyber-secondary: #ff003c;
        --cyber-accent: #fcee0a;
        --cyber-green: #00ff88;
        --glow-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
    }
    body {
        background: var(--cyber-bg);
        margin: 0;
        font-family: 'Courier New', Courier, monospace;
        color: #fff;
    }
    .game-area {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
        padding: 20px;
        position: relative;
    }
    
    /* Cyber Ludo Layout */
    .ludo-arena {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
        background: var(--cyber-board);
        padding: 40px;
        border-radius: 10px;
        border: 2px solid var(--cyber-primary);
        box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
    }
    
    .ludo-header {
        text-align: center;
        margin-bottom: -10px;
        font-family: 'Courier New', Courier, monospace;
    }
    .ludo-header h1 {
        font-size: 3rem;
        text-transform: uppercase;
        letter-spacing: 5px;
        color: var(--cyber-primary);
        text-shadow: 0 0 10px var(--cyber-primary);
        margin: 0;
    }
    .ludo-header p {
        color: var(--cyber-accent);
        text-shadow: 0 0 5px var(--cyber-accent);
        font-weight: bold;
    }

    .ludo-container {
        display: grid;
        grid-template-columns: 200px 500px 200px;
        gap: 20px;
        align-items: center;
        justify-content: center;
    }

    /* Player Profile Cards */
    .player-panel {
        background: rgba(0,0,0,0.6);
        border-radius: 8px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        transition: all 0.3s;
        border: 1px solid #333;
        opacity: 0.6;
    }
    .player-panel.active {
        opacity: 1;
        transform: scale(1.05);
        background: #1a2235;
    }
    .player-panel.active-red { border-color: var(--cyber-secondary); box-shadow: 0 0 30px rgba(255,0,60,0.4); }
    .player-panel.active-green { border-color: var(--cyber-green); box-shadow: 0 0 30px rgba(0,255,136,0.4); }
    .player-panel.active-yellow { border-color: var(--cyber-accent); box-shadow: 0 0 30px rgba(252,238,10,0.4); }
    .player-panel.active-blue { border-color: var(--cyber-primary); box-shadow: 0 0 30px rgba(0,240,255,0.4); }

    .avatar-img {
        width: 80px;
        height: 80px;
        border-radius: 5px; /* Square cyber look */
        border: 2px solid transparent;
        object-fit: cover;
    }
    .player-name {
        font-weight: 800;
        font-size: 1.1rem;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    /* Modal Styles */
    #mode-modal {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(11, 15, 25, 0.9);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        backdrop-filter: blur(5px);
    }
    .modal-content {
        background: #1a2235;
        padding: 40px;
        border: 2px solid var(--cyber-primary);
        box-shadow: var(--glow-shadow);
        text-align: center;
        border-radius: 8px;
    }
    .modal-content h2 { color: #fff; margin-bottom: 30px; text-shadow: 0 0 10px var(--cyber-primary); }
    .mode-buttons { display: flex; gap: 20px; justify-content: center; }

    .btn-cyber {
        background: transparent;
        color: var(--cyber-primary);
        border: 1px solid var(--cyber-primary);
        padding: 10px 20px;
        font-family: 'Courier New', Courier, monospace;
        font-weight: bold;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
    }
    .btn-cyber:hover {
        background: var(--cyber-primary);
        color: #000;
        box-shadow: 0 0 20px var(--cyber-primary);
    }
    .btn-cyber.pc-selected {
        background: var(--cyber-primary);
        color: #000;
        box-shadow: 0 0 20px var(--cyber-primary);
    }
    
    .panel-left { grid-row: 1; grid-column: 1; display:flex; flex-direction:column; justify-content:center; gap: 50px; height:100%; }
    .panel-right { grid-row: 1; grid-column: 3; display:flex; flex-direction:column; justify-content:center; gap: 50px; height:100%; }

    /* 3D Dice styling */
    .dice-container {
        width: 80px;
        height: 80px;
        perspective: 600px;
        cursor: pointer;
        display: none;
    }
    .player-panel.active .dice-container {
        display: block;
    }

    .dice {
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .dice.rolling {
        transition: transform 0.1s linear;
    }

    .face {
        position: absolute;
        width: 80px;
        height: 80px;
        background: #111;
        border: 2px solid var(--cyber-primary);
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .face.f-red { border-color: var(--cyber-secondary); box-shadow: inset 0 0 20px rgba(255,0,60,0.5); }
    .face.f-green { border-color: var(--cyber-green); box-shadow: inset 0 0 20px rgba(0,255,136,0.5); }
    .face.f-yellow { border-color: var(--cyber-accent); box-shadow: inset 0 0 20px rgba(252,238,10,0.5); }
    .face.f-blue { border-color: var(--cyber-primary); box-shadow: inset 0 0 20px rgba(0,240,255,0.5); }

    .dot {
        width: 16px;
        height: 16px;
        background: #fff;
        border-radius: 0; /* Cyber dots are square! */
        box-shadow: 0 0 10px #fff;
    }

    .front  { transform: rotateY(0deg) translateZ(40px); }
    .back   { transform: rotateY(180deg) translateZ(40px); }
    .right  { transform: rotateY(90deg) translateZ(40px); }
    .left   { transform: rotateY(-90deg) translateZ(40px); }
    .top    { transform: rotateX(90deg) translateZ(40px); }
    .bottom { transform: rotateX(-90deg) translateZ(40px); }

    .front { display: flex; justify-content: center; align-items: center; }
    .back { flex-direction: column; justify-content: space-around; align-items: center; padding: 10px;}
    .back .dot:nth-child(1) { align-self: flex-start; }
    .back .dot:nth-child(2) { align-self: flex-end; }
    .right { flex-direction: column; justify-content: space-between; align-items: center; padding: 10px;}
    .right .dot:nth-child(1) { align-self: flex-start; }
    .right .dot:nth-child(3) { align-self: flex-end; }
    .left { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; padding: 15px;}
    .top { display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; padding: 10px;}
    .top .dot:nth-child(1) { grid-column: 1; grid-row: 1; }
    .top .dot:nth-child(2) { grid-column: 3; grid-row: 1; }
    .top .dot:nth-child(3) { grid-column: 2; grid-row: 2; }
    .top .dot:nth-child(4) { grid-column: 1; grid-row: 3; }
    .top .dot:nth-child(5) { grid-column: 3; grid-row: 3; }
    .bottom { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; gap: 10px; padding: 15px;}

    /* LUDO BOARD - LUDO KING EXACT GRID */
    .ludo-board {
        width: 500px;
        height: 500px;
        background: var(--cyber-bg);
        border: 2px solid var(--cyber-primary);
        box-shadow: 0 0 40px rgba(0, 240, 255, 0.3);
        display: grid;
        grid-template-columns: repeat(15, 1fr);
        grid-template-rows: repeat(15, 1fr);
        position: relative;
    }

    .cell {
        border: 1px solid rgba(0, 240, 255, 0.2);
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
    }

    /* Absolute Center Triangles */
    .center-home {
        grid-column: 7 / 10;
        grid-row: 7 / 10;
        position: relative;
        overflow: hidden;
        background: #000;
        border: 1px solid var(--cyber-primary);
    }
    
    .triangle {
        position: absolute;
        width: 0;
        height: 0;
        border-style: solid;
    }
    
    .tri-red { border-width: 50px 0 50px 50px; border-color: transparent transparent transparent var(--cyber-secondary); left: 0; top: 0; filter: drop-shadow(0 0 5px var(--cyber-secondary));}
    .tri-green { border-width: 50px 50px 0 50px; border-color: var(--cyber-green) transparent transparent transparent; left: 0; top: 0; filter: drop-shadow(0 0 5px var(--cyber-green));}
    .tri-blue { border-width: 0 50px 50px 50px; border-color: transparent transparent var(--cyber-primary) transparent; left: 0; bottom: 0; filter: drop-shadow(0 0 5px var(--cyber-primary));}
    .tri-yellow { border-width: 50px 50px 50px 0; border-color: transparent var(--cyber-accent) transparent transparent; right: 0; top: 0; filter: drop-shadow(0 0 5px var(--cyber-accent));}

    /* Home Bases */
    .home-red { grid-column: 1 / 7; grid-row: 1 / 7; background: rgba(255,0,60,0.1); display: flex; align-items: center; justify-content: center; border: 2px solid var(--cyber-secondary); box-shadow: inset 0 0 20px rgba(255,0,60,0.3); }
    .home-green { grid-column: 10 / 16; grid-row: 1 / 7; background: rgba(0,255,136,0.1); display: flex; align-items: center; justify-content: center; border: 2px solid var(--cyber-green); box-shadow: inset 0 0 20px rgba(0,255,136,0.3);}
    .home-yellow { grid-column: 10 / 16; grid-row: 10 / 16; background: rgba(252,238,10,0.1); display: flex; align-items: center; justify-content: center; border: 2px solid var(--cyber-accent); box-shadow: inset 0 0 20px rgba(252,238,10,0.3);}
    .home-blue { grid-column: 1 / 7; grid-row: 10 / 16; background: rgba(0,240,255,0.1); display: flex; align-items: center; justify-content: center; border: 2px solid var(--cyber-primary); box-shadow: inset 0 0 20px rgba(0,240,255,0.3);}

    .home-inner {
        width: 65%;
        height: 65%;
        background: rgba(0,0,0,0.8);
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 20px;
        padding: 20px;
        box-shadow: 0 0 10px rgba(0,0,0,0.8);
        border: 1px solid #333;
    }

    .home-circle {
        border-radius: 0; /* Cyber */
        width: 100%;
        height: 100%;
        border: 1px solid #fff;
    }
    .home-red .home-circle { background: rgba(255,0,60,0.3); border-color: var(--cyber-secondary); box-shadow: inset 0 0 10px var(--cyber-secondary);}
    .home-green .home-circle { background: rgba(0,255,136,0.3); border-color: var(--cyber-green); box-shadow: inset 0 0 10px var(--cyber-green);}
    .home-yellow .home-circle { background: rgba(252,238,10,0.3); border-color: var(--cyber-accent); box-shadow: inset 0 0 10px var(--cyber-accent);}
    .home-blue .home-circle { background: rgba(0,240,255,0.3); border-color: var(--cyber-primary); box-shadow: inset 0 0 10px var(--cyber-primary);}

    /* Moving Pawns */
    .pawn {
        width: 26px;
        height: 26px;
        border-radius: 4px; /* blocky cyber pawns! */
        border: 1px solid #fff;
        position: absolute;
        cursor: pointer;
        z-index: 50;
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), left 0.3s ease, top 0.3s ease;
        box-shadow: 0 0 10px #000;
    }

    .pawn::after {
        content: '';
        position: absolute;
        top: 25%; left: 25%;
        width: 50%; height: 50%;
        background: rgba(255,255,255,0.8);
        border-radius: 2px;
        box-shadow: 0 0 5px #fff;
    }

    .pawn-red { background: var(--cyber-secondary); box-shadow: 0 0 10px var(--cyber-secondary); }
    .pawn-green { background: var(--cyber-green); box-shadow: 0 0 10px var(--cyber-green);}
    .pawn-yellow { background: var(--cyber-accent); box-shadow: 0 0 10px var(--cyber-accent);}
    .pawn-blue { background: var(--cyber-primary); box-shadow: 0 0 10px var(--cyber-primary);}

    .pulsing-pawn {
        animation: pawnPulse 1s infinite alternate;
        z-index: 60;
    }
    @keyframes pawnPulse {
        from { transform: scale(1); filter: brightness(1) drop-shadow(0 0 10px #fff); }
        to { transform: scale(1.3); filter: brightness(1.5) drop-shadow(0 0 20px #fff); }
    }

    .fa-star {
        color: var(--cyber-accent);
        font-size: 1.5rem;
        text-shadow: 0 0 10px var(--cyber-accent);
    }

    /* Path Colors */
    .bg-red { background-color: rgba(255,0,60,0.2); border-color: var(--cyber-secondary); box-shadow: inset 0 0 5px var(--cyber-secondary); }
    .bg-green { background-color: rgba(0,255,136,0.2); border-color: var(--cyber-green); box-shadow: inset 0 0 5px var(--cyber-green); }
    .bg-yellow { background-color: rgba(252,238,10,0.2); border-color: var(--cyber-accent); box-shadow: inset 0 0 5px var(--cyber-accent); }
    .bg-blue { background-color: rgba(0,240,255,0.2); border-color: var(--cyber-primary); box-shadow: inset 0 0 5px var(--cyber-primary); }
</style>
{% endblock %}

{% block content %}
<div class="game-area">
    <!-- Mode Selection Modal -->
    <div id="mode-modal">
        <div class="modal-content">
            <h2>ENGAGEMENT MODULE</h2>
            <p style="color: #00f0ff; margin-bottom: 20px;">Select Player Configuration</p>
            
            <div class="player-count-btns" style="display: flex; gap: 10px; margin-bottom: 30px; justify-content: center;">
                <button class="btn-cyber pc-btn pc-selected" id="ludo-pc-2" onclick="setLudoPlayers(2)" style="flex:1;">2P</button>
                <button class="btn-cyber pc-btn" id="ludo-pc-3" onclick="setLudoPlayers(3)" style="flex:1;">3P</button>
                <button class="btn-cyber pc-btn" id="ludo-pc-4" onclick="setLudoPlayers(4)" style="flex:1;">4P</button>
            </div>

            <div class="mode-buttons">
                <button class="btn-cyber" onclick="setMode('pvp')">MULTIPLAYER (PASS & PLAY)</button>
                <button class="btn-cyber" onclick="setMode('pve')">PLAYER VS CPU</button>
            </div>
        </div>
    </div>

    <div class="ludo-arena" id="arena" style="display: none;">
        <div class="ludo-header">
            <h1>Ludo Protocol</h1>
            <p>VIRTUAL COMBAT MATRIX</p>
        </div>

        <div class="ludo-container">
            <!-- Left Panels (Red and Blue) -->
            <div class="panel-left">
                <!-- RED -->
                <div class="player-panel" id="panel-red">
                    <img src="https://api.dicebear.com/7.x/shapes/svg?seed={{ user.username }}&backgroundColor=ff003c" class="avatar-img" style="border-color: var(--cyber-secondary);">
                    <span class="player-name" style="color: var(--cyber-secondary);" id="red-name">{{ user.username }}</span>
                    
                    <div class="dice-container" onclick="rollDice('RED')">
                        <div class="dice" id="dice-red">
                            <div class="face front f-red"><div class="dot"></div></div>
                            <div class="face back f-red"><div class="dot"></div><div class="dot"></div></div>
                            <div class="face right f-red"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                            <div class="face left f-red"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                            <div class="face top f-red"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                            <div class="face bottom f-red"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                        </div>
                    </div>
                </div>

                <!-- BLUE -->
                <div class="player-panel" id="panel-blue">
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=BlueBot&backgroundColor=00f0ff" class="avatar-img" style="border-color: var(--cyber-primary);">
                    <span class="player-name" style="color: var(--cyber-primary);" id="blue-name">Blue</span>
                    
                    <div class="dice-container" onclick="rollDice('BLUE')">
                        <div class="dice" id="dice-blue">
                            <div class="face front f-blue"><div class="dot"></div></div>
                            <div class="face back f-blue"><div class="dot"></div><div class="dot"></div></div>
                            <div class="face right f-blue"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                            <div class="face left f-blue"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                            <div class="face top f-blue"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                            <div class="face bottom f-blue"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Center Board -->
            <div class="ludo-board" id="ludoBoard">
            </div>

            <!-- Right Panels (Green and Yellow) -->
            <div class="panel-right">
                <!-- GREEN -->
                <div class="player-panel" id="panel-green">
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=GreenBot&backgroundColor=00ff88" class="avatar-img" style="border-color: var(--cyber-green);">
                    <span class="player-name" style="color: var(--cyber-green);" id="green-name">Green</span>
                    
                    <div class="dice-container" onclick="rollDice('GREEN')">
                        <div class="dice" id="dice-green">
                            <div class="face front f-green"><div class="dot"></div></div>
                            <div class="face back f-green"><div class="dot"></div><div class="dot"></div></div>
                            <div class="face right f-green"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                            <div class="face left f-green"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                            <div class="face top f-green"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                            <div class="face bottom f-green"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                        </div>
                    </div>
                </div>

                <!-- YELLOW -->
                <div class="player-panel" id="panel-yellow">
                    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=YellowBot&backgroundColor=fcee0a" class="avatar-img" style="border-color: var(--cyber-accent);">
                    <span class="player-name" style="color: var(--cyber-accent);" id="yellow-name">Yellow</span>
                    
                    <div class="dice-container" onclick="rollDice('YELLOW')">
                        <div class="dice" id="dice-yellow">
                            <div class="face front f-yellow"><div class="dot"></div></div>
                            <div class="face back f-yellow"><div class="dot"></div><div class="dot"></div></div>
                            <div class="face right f-yellow"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                            <div class="face left f-yellow"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                            <div class="face top f-yellow"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                            <div class="face bottom f-yellow"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div style="margin-top: 20px;">
            <button class="btn-cyber" onclick="location.reload()">REBOOT PROTOCOL</button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/games/ludo.js' %}?v={{ request.resolver_match.view_name|default:'2' }}"></script>
{% endblock %}
